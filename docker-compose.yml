services:
  db:
    image: mysql:8.0
    container_name: school-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: school_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:

    depends_on:
      db:
        condition: service_healthy 
    build: ./backend
    container_name: school-backend
    restart: always
    command: sh -c "node src/init-db.js && node src/index.js"
    ports:
      - "3000:3000"
    
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-app_user}
      - DB_PASSWORD=${DB_PASSWORD:-app_password}
      - DB_NAME=${DB_NAME:-school_db}
      - NODE_ENV=${NODE_ENV:-production}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: